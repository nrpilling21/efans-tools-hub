<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask eFans â Staff Assistant</title>
  <link rel="icon" href="https://www.efans.co.uk/cdn/shop/files/logo-updated-white_115x@2x.png?v=1613737190">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fff; color: #181a1b; height: 100vh;
      display: flex; flex-direction: column;
    }

    /* Top bar â matches tools hub */
    .topbar { padding: 16px 24px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar img { height: 28px; width: auto; filter: brightness(0); }
    .topbar-divider { width: 1px; height: 20px; background: #d5d5d5; }
    .topbar-title { font-size: 15px; font-weight: 600; color: #181a1b; }
    .back-link { font-size: 13px; color: #198FEF; text-decoration: none; padding: 6px 12px; border: 1px solid #d5d5d5; border-radius: 6px; transition: all 0.15s; }
    .back-link:hover { background: #f0f7ff; border-color: #198FEF; }
    .logout-btn { font-size: 13px; color: #6b6b6b; padding: 6px 12px; border: 1px solid #d5d5d5; border-radius: 6px; cursor: pointer; background: #fff; font-family: inherit; transition: all 0.15s; }
    .logout-btn:hover { color: #181a1b; border-color: #181a1b; }

    /* Messages area */
    .messages { flex: 1; overflow-y: auto; padding: 24px 20px; }
    .messages-inner { max-width: 700px; margin: 0 auto; }

    /* Empty state */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0 40px; }
    .empty-state h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #181a1b; }
    .empty-state p { color: #6b6b6b; font-size: 14px; margin-bottom: 32px; }
    .starters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 500px; }
    .starter-btn { padding: 12px 14px; border: 1px solid #d5d5d5; border-radius: 10px; text-align: left; font-size: 13px; font-weight: 500; color: #181a1b; cursor: pointer; background: #fff; font-family: inherit; transition: all 0.15s; line-height: 1.4; }
    .starter-btn:hover { border-color: #198FEF; background: #f8fbff; }

    /* Messages */
    .msg { display: flex; margin-bottom: 16px; gap: 12px; }
    .msg.user { justify-content: flex-end; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; margin-top: 2px; }
    .msg.assistant .msg-avatar { background: #181a1b; color: #fff; }
    .msg.user .msg-avatar { display: none; }
    .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.65; }
    .msg.user .msg-bubble { background: #181a1b; color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-bubble { background: #f5f5f5; color: #181a1b; border-bottom-left-radius: 4px; }

    /* Markdown in messages */
    .msg-bubble strong, .msg-bubble b { font-weight: 600; }
    .msg-bubble ul, .msg-bubble ol { margin-left: 18px; margin-top: 6px; margin-bottom: 8px; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }

    /* Typing */
    .typing { display: flex; gap: 5px; padding: 4px 0; }
    .dot { width: 7px; height: 7px; background: #999; border-radius: 50%; animation: pulse 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,60%,100% { opacity:.3 } 30% { opacity:1 } }

    /* Input */
    .input-area { border-top: 1px solid #e0e0e0; padding: 14px 20px; background: #fff; }
    .input-inner { max-width: 700px; margin: 0 auto; display: flex; gap: 8px; }
    .input-inner input { flex: 1; padding: 11px 16px; border: 1px solid #d5d5d5; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; color: #181a1b; }
    .input-inner input:focus { border-color: #198FEF; box-shadow: 0 0 0 2px rgba(25,143,239,0.08); }
    .send-btn { padding: 11px 14px; background: #181a1b; color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; }
    .send-btn:hover { background: #333; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Login overlay */
    .login-overlay { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-box { width: 100%; max-width: 340px; padding: 20px; text-align: center; }
    .login-box h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; color: #181a1b; }
    .login-box .sub { color: #6b6b6b; font-size: 13px; margin-bottom: 32px; }
    .login-box label { display: block; text-align: left; font-size: 13px; font-weight: 500; color: #181a1b; margin-bottom: 6px; }
    .login-box input { width: 100%; padding: 11px 14px; border: 1px solid #d5d5d5; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 16px; }
    .login-box input:focus { border-color: #198FEF; }
    .login-box .enter-btn { width: 100%; padding: 11px; background: #181a1b; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .login-box .enter-btn:hover { background: #333; }
    .login-box .error { color: #c00; font-size: 13px; margin-bottom: 12px; display: none; }
    .login-box .footer { margin-top: 32px; font-size: 11px; color: #aaa; }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .starters { grid-template-columns: 1fr; }
      .msg-bubble { max-width: 90%; }
      .topbar-divider, .topbar-title { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h1>Ask eFans</h1>
    <p class="sub">Staff Knowledge Assistant</p>
    <label for="pass">Passcode</label>
    <input type="password" id="pass" placeholder="Enter passcode" autofocus>
    <p class="error" id="loginError">Incorrect passcode</p>
    <button class="enter-btn" onclick="login()">Enter</button>
    <p class="footer">Internal use only â eFans Direct Ltd</p>
  </div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="hidden" style="display:flex;flex-direction:column;height:100vh;">
  <div class="topbar">
    <div class="topbar-left">
      <img src="https://www.efans.co.uk/cdn/shop/files/logo-updated-white_115x@2x.png?v=1613737190" alt="eFans">
      <div class="topbar-divider"></div>
      <span class="topbar-title">Ask eFans</span>
    </div>
    <div style="display:flex;gap:8px;">
      <a href="https://efans-tools-hub.vercel.app/" class="back-link">Tools Hub</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="messages" id="messagesArea">
    <div class="messages-inner" id="messagesInner">
      <div id="emptyState" class="empty-state">
        <h2>How can I help?</h2>
        <p>Ask about suppliers, products, website, policies â anything eFans</p>
        <div class="starters">
          <button class="starter-btn" onclick="ask(this.textContent)">Who's our contact at Systemair?</button>
          <button class="starter-btn" onclick="ask(this.textContent)">How do I add a product to the website?</button>
          <button class="starter-btn" onclick="ask(this.textContent)">What fan types do we stock?</button>
          <button class="starter-btn" onclick="ask(this.textContent)">What's the returns process?</button>
          <button class="starter-btn" onclick="ask(this.textContent)">What are our margin guidelines?</button>
          <button class="starter-btn" onclick="ask(this.textContent)">I'm new â where do I start?</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <input type="text" id="chatInput" placeholder="Ask something about eFans..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)send()">
      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://zzcqfrtwiikyixvegtwt.supabase.co/functions/v1/ask-efans';
let passcode = '';
let messages = [];
let loading = false;

// --- Auth ---
document.getElementById('pass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function login() {
  passcode = document.getElementById('pass').value;
  if (!passcode) return;
  document.getElementById('loginOverlay').classList.add('hidden');
  const chat = document.getElementById('chatScreen');
  chat.classList.remove('hidden');
  chat.style.display = 'flex';
  document.getElementById('chatInput').focus();
}

function logout() {
  passcode = '';
  messages = [];
  loading = false;
  document.getElementById('messagesInner').querySelectorAll('.msg').forEach(el => el.remove());
  document.getElementById('emptyState').classList.remove('hidden');
  document.getElementById('chatScreen').classList.add('hidden');
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('pass').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// --- Chat ---
function ask(text) {
  document.getElementById('chatInput').value = text;
  send();
}

async function send() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || loading) return;

  document.getElementById('emptyState')?.classList.add('hidden');
  input.value = '';
  loading = true;
  document.getElementById('sendBtn').disabled = true;

  // User message
  messages.push({ role: 'user', content: text });
  addBubble('user', text);

  // Typing indicator
  const typingEl = addTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, passcode }),
    });

    if (res.status === 401) {
      typingEl.remove();
      document.getElementById('loginError').style.display = 'block';
      logout();
      return;
    }

    if (!res.ok) {
      throw new Error('API error: ' + res.status);
    }

    // Stream response
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let assistantText = '';

    typingEl.remove();
    const bubbleEl = addBubble('assistant', '');
    const contentEl = bubbleEl.querySelector('.msg-bubble');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      assistantText += decoder.decode(value, { stream: true });
      contentEl.innerHTML = renderMarkdown(assistantText);
      document.getElementById('messagesArea').scrollTop = 999999;
    }

    messages.push({ role: 'assistant', content: assistantText });
  } catch (err) {
    typingEl?.remove();
    addBubble('assistant', 'Sorry, something went wrong. Please try again.');
    console.error(err);
  } finally {
    loading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('chatInput').focus();
  }
}

function addBubble(role, text) {
  const inner = document.getElementById('messagesInner');
  const row = document.createElement('div');
  row.className = 'msg ' + role;

  if (role === 'assistant') {
    row.innerHTML = '<div class="msg-avatar">e</div><div class="msg-bubble">' + (text ? renderMarkdown(text) : '') + '</div>';
  } else {
    row.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
  }
  inner.appendChild(row);
  document.getElementById('messagesArea').scrollTop = 999999;
  return row;
}

function addTyping() {
  const inner = document.getElementById('messagesInner');
  const row = document.createElement('div');
  row.className = 'msg assistant';
  row.innerHTML = '<div class="msg-avatar">e</div><div class="msg-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  inner.appendChild(row);
  document.getElementById('messagesArea').scrollTop = 999999;
  return row;
}

// --- Markdown rendering (lightweight) ---
function renderMarkdown(text) {
  let html = escapeHtml(text);
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Unordered lists
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<strong>$1</strong>');
  html = html.replace(/^## (.+)$/gm, '<strong>$1</strong>');
  html = html.replace(/^# (.+)$/gm, '<strong>$1</strong>');
  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p><\/p>/g, '');
  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
